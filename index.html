<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="version" content="1.0.0" />
  <title>Pengu's Planet 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #fce8f4; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(220, 100, 150, 0.85);
      font-family: Georgia, serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(255,200,220,0.8);
    }
    #followPenguinBtn {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      background: rgba(232, 77, 136, 0.9);
      color: #fff;
      font-family: Georgia, serif;
      font-size: 14px;
      letter-spacing: 0.02em;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 8px 20px rgba(232, 77, 136, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    #followPenguinBtn:hover {
      transform: translateX(-50%) translateY(-1px);
      box-shadow: 0 10px 24px rgba(232, 77, 136, 0.35);
    }
    #followPenguinBtn.is-active {
      background: rgba(111, 173, 133, 0.95);
      box-shadow: 0 8px 20px rgba(111, 173, 133, 0.28);
    }
    #nightCycleBtn {
      position: fixed;
      top: 18px;
      right: 18px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.75);
      background: rgba(58, 90, 176, 0.85);
      color: #fff;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 8px 18px rgba(40, 66, 138, 0.34);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      display: grid;
      place-items: center;
      padding: 0;
    }
    #nightCycleBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(40, 66, 138, 0.4);
    }
    #nightCycleBtn.is-active {
      background: rgba(28, 44, 92, 0.92);
      box-shadow: 0 8px 20px rgba(20, 32, 70, 0.45);
    }
    #nightCycleBtn .icon-day,
    #nightCycleBtn .icon-night {
      font-size: 20px;
      line-height: 1;
      transition: opacity 0.2s ease, transform 0.2s ease;
      position: absolute;
    }
    #nightCycleBtn .icon-night { opacity: 0; transform: scale(0.8); }
    #nightCycleBtn.is-night .icon-day { opacity: 0; transform: scale(0.8); }
    #nightCycleBtn.is-night .icon-night { opacity: 1; transform: scale(1); }
  </style>
</head>
<body>
<!-- <div id="hint" style="text-align: center">✨ drag to explore ✨<br>✨ pinch to zoom ✨</div> -->
<button id="followPenguinBtn" type="button">Follow the penguin</button>
<button id="nightCycleBtn" type="button" aria-label="Enable night cycle" title="Enable night cycle">
  <span class="icon-day" aria-hidden="true">☀</span>
  <span class="icon-night" aria-hidden="true">🌙</span>
</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js?v=1.0.0"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js?v=1.0.0"></script>

<script type="module">
// ── Imports ────────────────────────────────────────────────────────────────
import { rnd, pick, PLANET_R } from './utils.js';
import { _surfUp, surfaceY, placeOnPlanet, placeOnSphere } from './placement.js';
import { makeTree, makeSnowTree, makeFlower, makeHouse, makeHeart, makeTextSprite, makeCloud, makePenguin } from './objects.js';

// ── Version Control ────────────────────────────────────────────────────────
const APP_VERSION = '1.0.0';
// ── Scene ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const DAY_SKY_COLOR = new THREE.Color(0xfce8f4);
const NIGHT_SKY_COLOR = new THREE.Color(0x0e1730);
const DAY_FOG_COLOR = new THREE.Color(0xfce8f4);
const NIGHT_FOG_COLOR = new THREE.Color(0x111a35);
const DAY_SUN_COLOR = new THREE.Color(0xfff4e0);
const NIGHT_SUN_COLOR = new THREE.Color(0xa7b6ff);
const DAY_FILL_COLOR = new THREE.Color(0xd8d0ff);
const NIGHT_FILL_COLOR = new THREE.Color(0x5c7bd1);
scene.background = DAY_SKY_COLOR.clone();
scene.fog = new THREE.FogExp2(DAY_FOG_COLOR.getHex(), 0.004);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 14, 24);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── Controls ───────────────────────────────────────────────────────────────
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
const DEFAULT_MIN_DISTANCE = 14;
const DEFAULT_MAX_DISTANCE = 40;
const FOLLOW_MIN_DISTANCE = 3.2;
const FOLLOW_MAX_DISTANCE = 12;
const FOLLOW_SNAP_DISTANCE = 3.2;
controls.minDistance = DEFAULT_MIN_DISTANCE;
controls.maxDistance = DEFAULT_MAX_DISTANCE;
// Set very large polar angle limits to allow continuous rotation
controls.minPolarAngle = -Infinity;
controls.maxPolarAngle = Infinity;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.7;
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

const followPenguinBtn = document.getElementById('followPenguinBtn');
const nightCycleBtn = document.getElementById('nightCycleBtn');
let isFollowingPenguin = false;
let isNightCycleEnabled = false;
let nightBlend = 0;
const followTarget = new THREE.Vector3();

followPenguinBtn.addEventListener('click', () => {
  isFollowingPenguin = !isFollowingPenguin;
  followPenguinBtn.classList.toggle('is-active', isFollowingPenguin);
  followPenguinBtn.textContent = isFollowingPenguin ? 'Following the penguin' : 'Follow the penguin';
  controls.autoRotate = !isFollowingPenguin;
  if (isFollowingPenguin) {
    // Disable orbit controls for third-person camera
    controls.enabled = false;
    controls.target.copy(penguinPivot.position);
  } else {
    // Re-enable orbit controls when not following
    controls.enabled = true;
    controls.minDistance = DEFAULT_MIN_DISTANCE;
    controls.maxDistance = DEFAULT_MAX_DISTANCE;
  }
});

nightCycleBtn.addEventListener('click', () => {
  isNightCycleEnabled = !isNightCycleEnabled;
  nightCycleBtn.classList.toggle('is-active', isNightCycleEnabled);
  const label = isNightCycleEnabled ? 'Disable night cycle' : 'Enable night cycle';
  nightCycleBtn.setAttribute('aria-label', label);
  nightCycleBtn.setAttribute('title', label);
});

// ── Lights ─────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffeef8, 0.65);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff4e0, 0.85);
sun.position.set(6, 12, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
Object.assign(sun.shadow.camera, { near:0.5, far:60, left:-14, right:14, top:14, bottom:-14 });
scene.add(sun);
const fill = new THREE.DirectionalLight(0xd8d0ff, 0.3);
fill.position.set(-5, 4, -5);
scene.add(fill);

// ── Planet ──────────────────────────────────────────────────────────────
const planetMesh = new THREE.Mesh(
  new THREE.SphereGeometry(PLANET_R, 64, 48),
  new THREE.MeshLambertMaterial({color: 0x4f9a63})
);
planetMesh.castShadow = true;
planetMesh.receiveShadow = true;
scene.add(planetMesh);

// Bottom hemisphere: icy/snowy cap
const iceCap = new THREE.Mesh(
  new THREE.SphereGeometry(PLANET_R + 0.05, 48, 32, 0, Math.PI*2, Math.PI*0.52, Math.PI*0.48),
  new THREE.MeshLambertMaterial({color: 0xd4e8f5})
);
iceCap.receiveShadow = true;
scene.add(iceCap);

// Snow particles - aggressive blizzard
const snowParticles = [];
for (let i = 0; i < 280; i++) {
  const flake = new THREE.Mesh(
    new THREE.SphereGeometry(rnd(0.05, 0.12), 4, 4),
    new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: rnd(0.6, 0.95)})
  );
  const angle = rnd(0, Math.PI * 2);
  const dist = rnd(2, 10);
  flake.position.set(
    Math.cos(angle) * dist,
    rnd(-9, -1),
    Math.sin(angle) * dist
  );
  scene.add(flake);
  snowParticles.push({
    mesh: flake,
    velocity: new THREE.Vector3(rnd(-0.08, 0.08), rnd(0.05, 0.12), rnd(-0.08, 0.08)),
    swirl: rnd(0, Math.PI * 2),
    swirlSpeed: rnd(0.03, 0.08),
    resetY: rnd(-1.2, -2.5)
  });
}

// Air currents - twirling wind lines
const airLines = [];
for (let i = 0; i < 12; i++) {
  const points = [];
  for (let j = 0; j < 20; j++) {
    points.push(new THREE.Vector3(0, j * 0.3, 0));
  }
  const curve = new THREE.CatmullRomCurve3(points);
  const geometry = new THREE.TubeGeometry(curve, 20, 0.02, 4, false);
  const material = new THREE.MeshBasicMaterial({
    color: 0xc8d8e8,
    transparent: true,
    opacity: 0.4
  });
  const airLine = new THREE.Mesh(geometry, material);
  
  const angle = rnd(0, Math.PI * 2);
  const dist = rnd(3, 9);
  airLine.position.set(
    Math.cos(angle) * dist,
    rnd(-7, -3),
    Math.sin(angle) * dist
  );
  
  scene.add(airLine);
  airLines.push({
    mesh: airLine,
    curve: curve,
    points: points,
    baseAngle: angle,
    baseDist: dist,
    phase: rnd(0, Math.PI * 2),
    speed: rnd(0.02, 0.05),
    twist: rnd(0.8, 1.5)
  });
}

// ── Trees ──────────────────────────────────────────────────────────────────
// Obstacle list for penguin collision
const obstacles = [];

[[-6.5,2.1],[-2.4,6.8],[5.8,-3.7],[1.5,-7.0],[-7.2,-1.8],[3.9,6.2],[-4.1,-5.5],[6.7,0.9],[-1.2,-6.5],[4.6,5.1]]
.forEach(([x,z]) => { const t=makeTree(x,z,rnd(0.65,1.15)); placeOnPlanet(t,x,z); scene.add(t); obstacles.push({x,z,r:0.45}); });

// Add snow-covered trees in bottom hemisphere
for(let i = 0; i < 20; i++) {
  const theta = rnd(0, Math.PI * 2); // Random angle around sphere
  const phi = rnd(Math.PI * 0.55, Math.PI * 0.95); // Bottom half angles (pi/2 to pi)
  const x = PLANET_R * Math.sin(phi) * Math.cos(theta);
  const y = PLANET_R * Math.cos(phi); // This will be negative
  const z = PLANET_R * Math.sin(phi) * Math.sin(theta);
  const pos = new THREE.Vector3(x, y, z);
  const t = makeSnowTree(0, 0, rnd(0.65, 1.15));
  placeOnSphere(t, pos);
  scene.add(t);
}

// ── Flowers (detailed 3D) ──────────────────────────────────────────────────
[[-3.6,-1.9],[3.6,1.9],[-1.9,3.8],[1.9,-3.8],[-4.3,0.9],[4.3,-0.9],[-2.8,3.1],[2.8,-3.1],
 [0.9,4.4],[-0.9,-4.4]]
.forEach(([x,z]) => { if(Math.hypot(x,z)<5.4){ const fl=makeFlower(x,z); scene.add(fl); obstacles.push({x,z,r:0.22}); } });

// ── Cute House ──────────────────────────────────────────────────────────────
// Add house to scene
const house = makeHouse(-2.0, -2.0);
scene.add(house);
obstacles.push({x: -2.0, z: -2.0, r: 1.22});

// ── Chimney smoke ─────────────────────────────────────────────────────────
// Chimney world pos is computed dynamically in animate loop
const _chimneyLocal = new THREE.Vector3(0.42, 2.18, 0.28);
const SMOKE_COUNT = 12;
const smokePuffs = [];
for (let i = 0; i < SMOKE_COUNT; i++) {
  const puff = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 8, 7),
    new THREE.MeshBasicMaterial({ color: 0xcccccc, transparent: true, opacity: 0, depthWrite: false })
  );
  scene.add(puff);
  smokePuffs.push({
    mesh: puff,
    life: i / SMOKE_COUNT,    // stagger start phases
    xDrift: rnd(-0.04, 0.04),
    zDrift: rnd(-0.04, 0.04)
  });
}

// ── Hearts ─────────────────────────────────────────────────────────────────

[[-1.9,0.8],[0,-1.4],[1.8,1.0]].forEach(([x,z]) => {
  const hsy = surfaceY(x, z);
  const h = makeHeart(0.22); h.position.set(x, hsy + 0.07, z);
  h.rotation.x=-Math.PI/2; h.rotation.z=rnd(-0.25,0.25); scene.add(h);
});

const floatingHearts = [];
for(let i=0;i<14;i++){
  const h = makeHeart(rnd(0.13,0.28));
  const ang = (i/14)*Math.PI*2+rnd(0,0.4);
  const incl = rnd(-Math.PI/4, Math.PI/3);
  const rad = rnd(PLANET_R+1.5, PLANET_R+5.5);
  h.position.set(Math.cos(incl)*Math.cos(ang)*rad, Math.sin(incl)*rad, Math.cos(incl)*Math.sin(ang)*rad);
  h.rotation.set(rnd(0,Math.PI),rnd(0,Math.PI),rnd(0,Math.PI));
  floatingHearts.push({mesh:h,speed:rnd(0.3,0.7),phase:rnd(0,Math.PI*2),rotSpd:rnd(0.2,0.5),baseR:rad,incl,ang});
  scene.add(h);
}

// ── Text sprite ────────────────────────────────────────────────────────────
const textSprite = makeTextSprite('I love you baby \u{1F495}');
textSprite.position.set(0,PLANET_R+4,0); scene.add(textSprite);
const subTextSprite = makeTextSprite([
  'thank you for making my life more beautiful',
  'and filling me with happiness everyday'
], {
  width: 1800,
  height: 180,
  fontSize: 28,
  fillColor: '#dd5a95',
  scaleX: 11.5,
  scaleY: 1.2,
  lineHeight: 44
});
subTextSprite.position.set(0, PLANET_R+2.6, 0); scene.add(subTextSprite);

// ── Clouds ─────────────────────────────────────────────────────────────────
scene.add(makeCloud(-7, 11.5, -4, 1.0)); scene.add(makeCloud(7, 12.0, -3, 1.1));
scene.add(makeCloud(-5, 11.8, 4, 0.85)); scene.add(makeCloud(8, 11.2, 5, 0.9));
scene.add(makeCloud(0, 12.5, -7, 1.2));

// ── Sparkles ───────────────────────────────────────────────────────────────
const verts=[];
for(let i=0;i<260;i++) verts.push(rnd(-24,24),rnd(-12,22),rnd(-24,24));
const sparkGeo=new THREE.BufferGeometry();
sparkGeo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
scene.add(new THREE.Points(sparkGeo,new THREE.PointsMaterial({color:0xffb0d8,size:0.13,transparent:true,opacity:0.75})));

// ── Stars (night cycle) ───────────────────────────────────────────────────
const starVerts = [];
for (let i = 0; i < 460; i++) starVerts.push(rnd(-42, 42), rnd(-42, 42), rnd(-42, 42));
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({
  color: 0xeef5ff,
  size: 0.16,
  transparent: true,
  opacity: 0,
  depthWrite: false
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ── Penguin ────────────────────────────────────────────────────────────────
const penguin = makePenguin();
penguin.position.set(0, 0, 0);
penguin.scale.setScalar(0.85);
penguin.traverse(child => { if (child instanceof THREE.Mesh) child.castShadow = true; });
const penguinPivot = new THREE.Group();
placeOnPlanet(penguinPivot, 2.2, 0);
penguinPivot.add(penguin);
scene.add(penguinPivot);

// Penguin starts at (2.2, 0) on sphere
const _initX = 2.2, _initZ = 0;
const _initY = surfaceY(_initX, _initZ);
const _initialDir = rnd(0, Math.PI*2);
const penguinState = {
  pos: new THREE.Vector3(_initX, _initY, _initZ), // 3D position on sphere surface
  dir: _initialDir, // current facing direction (smoothly interpolated)
  targetDir: _initialDir, // target facing direction (yaw angle in local tangent plane)
  speed: 0.022,
  speedMultiplier: 1.0, // Smoothly transitions between walk/sprint speeds
  currentQuaternion: penguinPivot.quaternion.clone(), // Initialize with starting orientation
  gesture: 'walk', gestureTick: 0, nextGesture: rnd(3,6),
  jumpY: 0, jumpVel: 0,
  turnTimer: rnd(1.5, 3.5), // time until next random turn
  turnDir: 0,
};

const sprintAirPuffs = [];
for (let i = 0; i < 14; i++) {
  const puff = new THREE.Mesh(
    new THREE.SphereGeometry(0.11, 10, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, depthWrite: false })
  );
  puff.visible = false;
  puff.castShadow = false;
  puff.receiveShadow = false;
  scene.add(puff);
  sprintAirPuffs.push({ mesh: puff, age: i / 14, offset: rnd(-0.24, 0.24) });
}

// ── Speech Bubble ──────────────────────────────────────────────────────────
const penguinThoughts = [
  '❄️ So cold!',
  '🐟 Where fish?',
  '⛸️ Nice ice!',
  '🎵 La la la~',
  '💭 Thinking...',
  '🌨️ Brrr!',
  '🏃 Gotta go fast!',
  '👧🏻 Where is momma?',
  '👱🏻‍♂️ Where is papa?',
  '🌸 Love flowers!'
];

// Create speech bubble sprite with background
const createSpeechBubble = (text) => {
  const canvas = document.createElement('canvas');
  canvas.width = 400;
  canvas.height = 120;
  const ctx = canvas.getContext('2d');
  
  // Draw rounded rectangle background
  const padding = 15;
  const cornerRadius = 20;
  ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
  ctx.lineWidth = 3;
  
  // Rounded rectangle path
  ctx.beginPath();
  ctx.moveTo(padding + cornerRadius, padding);
  ctx.lineTo(canvas.width - padding - cornerRadius, padding);
  ctx.quadraticCurveTo(canvas.width - padding, padding, canvas.width - padding, padding + cornerRadius);
  ctx.lineTo(canvas.width - padding, canvas.height - padding - 30 - cornerRadius);
  ctx.quadraticCurveTo(canvas.width - padding, canvas.height - padding - 30, canvas.width - padding - cornerRadius, canvas.height - padding - 30);
  
  // Speech bubble tail
  ctx.lineTo(canvas.width / 2 + 15, canvas.height - padding - 30);
  ctx.lineTo(canvas.width / 2, canvas.height - padding);
  ctx.lineTo(canvas.width / 2 - 15, canvas.height - padding - 30);
  
  ctx.lineTo(padding + cornerRadius, canvas.height - padding - 30);
  ctx.quadraticCurveTo(padding, canvas.height - padding - 30, padding, canvas.height - padding - 30 - cornerRadius);
  ctx.lineTo(padding, padding + cornerRadius);
  ctx.quadraticCurveTo(padding, padding, padding + cornerRadius, padding);
  ctx.closePath();
  
  ctx.fill();
  ctx.stroke();
  
  // Draw text
  ctx.shadowColor = 'rgba(100,100,100,0.3)';
  ctx.shadowBlur = 4;
  ctx.font = 'bold 32px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#333333';
  ctx.fillText(text, canvas.width / 2, 50);
  
  return canvas;
};

const speechBubble = new THREE.Sprite(
  new THREE.SpriteMaterial({ 
    map: new THREE.CanvasTexture(createSpeechBubble('')),
    transparent: true,
    opacity: 0
  })
);
speechBubble.scale.set(2.0, 0.8, 1);
speechBubble.position.set(0, 1.5, 0); // Position above penguin
penguinPivot.add(speechBubble); // Attach to penguin so it follows

const speechBubbleState = {
  visible: false,
  fadeTimer: 0,
  displayTimer: 0,
  nextAppearTime: rnd(5, 10), // Time until next bubble appears
  fadeDuration: 0.3, // Fade in/out duration in seconds
  displayDuration: 3.0 // How long to show the bubble
};

const GESTURES = ['wave','jump','spin','wiggle','tilt','sprint','sprint','wave'];

// Console helper: trigger sprint manually via window.runPenguinSprint()
window.runPenguinSprint = function(durationSec) {
  const d = Number(durationSec);
  const sprintDuration = Number.isFinite(d) && d > 0 ? d : rnd(2.6, 5.4);
  penguinState.gesture = 'sprint';
  penguinState.gestureTick = sprintDuration;
  penguinState.turnTimer = rnd(4.0, 7.0); // Reset turn timer for straighter sprint
  penguinState.nextGesture = rnd(3.0, 6.0);
  return { gesture: penguinState.gesture, duration: sprintDuration };
};

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ── Animate ────────────────────────────────────────────────────────────────
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  const dt=clock.getDelta ? 0.016 : 0.016;

  floatingHearts.forEach(({mesh,speed,phase,rotSpd,baseR,incl,ang})=>{
    const r = baseR + Math.sin(t*speed+phase)*0.32;
    mesh.position.set(Math.cos(incl)*Math.cos(ang)*r, Math.sin(incl)*r, Math.cos(incl)*Math.sin(ang)*r);
    mesh.rotation.y+=rotSpd*0.012;
  });
  textSprite.position.y=(PLANET_R+4)+Math.sin(t*0.9)*0.18;
  subTextSprite.position.y=(PLANET_R+2.6)+Math.sin(t*0.9+0.4)*0.12;

  // ── Penguin logic ───────────────────────────────────────────────────────
  const ps = penguinState;
  const DT = 0.016;
  ps.gestureTick  -= DT;
  ps.nextGesture  -= DT;
  ps.turnTimer    -= DT;

  const cycleTarget = isNightCycleEnabled ? (Math.sin(t * 0.12) * 0.5 + 0.5) : 0;
  nightBlend += (cycleTarget - nightBlend) * 0.02;
  nightCycleBtn.classList.toggle('is-night', nightBlend > 0.5);
  scene.background.copy(DAY_SKY_COLOR).lerp(NIGHT_SKY_COLOR, nightBlend);
  scene.fog.color.copy(DAY_FOG_COLOR).lerp(NIGHT_FOG_COLOR, nightBlend);
  ambient.intensity = 0.65 - 0.45 * nightBlend;
  sun.intensity = 0.85 - 0.75 * nightBlend;
  fill.intensity = 0.3 + 0.35 * nightBlend;
  sun.color.copy(DAY_SUN_COLOR).lerp(NIGHT_SUN_COLOR, nightBlend);
  fill.color.copy(DAY_FILL_COLOR).lerp(NIGHT_FILL_COLOR, nightBlend);
  const starFade = Math.max(0, (nightBlend - 0.2) / 0.8);
  const twinkle = 0.82 + 0.18 * Math.sin(t * 2.7);
  starMat.opacity = starFade * twinkle;
  stars.rotation.y += 0.00025 + nightBlend * 0.00065;

  // Pick new random gesture
  if(ps.nextGesture <= 0 && ps.gestureTick <= 0) {
    ps.gesture = GESTURES[Math.floor(Math.random()*GESTURES.length)];
    ps.gestureTick = ps.gesture==='sprint' ? rnd(2.6, 5.4) : rnd(1.5, 3.0);
    ps.nextGesture = rnd(3.0, 6.0);
    if(ps.gesture==='jump') ps.jumpVel = 0.055;
    if(ps.gesture==='sprint') ps.turnTimer = rnd(4.0, 7.0); // Reset turn timer for straighter sprint
  }
  if(ps.gestureTick <= 0) ps.gesture = 'walk';

  // ── Speech Bubble Animation ─────────────────────────────────────────────
  speechBubbleState.nextAppearTime -= DT;
  
  if (!speechBubbleState.visible && speechBubbleState.nextAppearTime <= 0) {
    // Time to show a new thought
    speechBubbleState.visible = true;
    speechBubbleState.fadeTimer = 0;
    speechBubbleState.displayTimer = speechBubbleState.displayDuration;
    
    // Pick a random thought
    const thought = penguinThoughts[Math.floor(Math.random() * penguinThoughts.length)];
    
    // Update the sprite texture with new text
    speechBubble.material.map.image = createSpeechBubble(thought);
    speechBubble.material.map.needsUpdate = true;
  }
  
  if (speechBubbleState.visible) {
    // Fade in
    if (speechBubbleState.fadeTimer < speechBubbleState.fadeDuration) {
      speechBubbleState.fadeTimer += DT;
      const fadeProgress = Math.min(speechBubbleState.fadeTimer / speechBubbleState.fadeDuration, 1);
      speechBubble.material.opacity = fadeProgress;
    } else {
      speechBubble.material.opacity = 1;
    }
    
    // Display timer
    speechBubbleState.displayTimer -= DT;
    
    // Fade out when display time is ending
    if (speechBubbleState.displayTimer <= speechBubbleState.fadeDuration) {
      const fadeOutProgress = speechBubbleState.displayTimer / speechBubbleState.fadeDuration;
      speechBubble.material.opacity = Math.max(fadeOutProgress, 0);
      
      if (speechBubbleState.displayTimer <= 0) {
        speechBubbleState.visible = false;
        speechBubble.material.opacity = 0;
        speechBubbleState.nextAppearTime = rnd(5, 10); // Wait before next thought
      }
    }
    
    // Gentle bobbing animation
    speechBubble.position.y = 1.5 + Math.sin(t * 2) * 0.05;
  }

  // Random turning (less frequent during sprint)
  if(ps.turnTimer <= 0) {
    const isSprinting = ps.gesture === 'sprint';
    ps.targetDir += isSprinting ? rnd(-0.3, 0.3) : rnd(-1.1, 1.1);
    ps.turnTimer = isSprinting ? rnd(4.0, 7.0) : rnd(1.5, 4.0);
  }

  // Normalize targetDir to prevent overflow
  ps.targetDir = (ps.targetDir % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);

  // Smoothly interpolate direction to prevent glitchy rapid direction changes
  // Handle angle wrapping for smooth shortest-path rotation
  let angleDiff = ps.targetDir - ps.dir;
  // Normalize angle difference to [-π, π]
  while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
  while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
  // Adjust turning speed based on gesture - slower during sprint for more realistic momentum
  const turnSpeed = (ps.gesture === 'sprint') ? 0.08 : 0.12; // Slower turning during sprint
  ps.dir += angleDiff * turnSpeed;
  // Keep dir normalized to [0, 2π] to prevent overflow
  ps.dir = (ps.dir % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);

  // Calculate tangent space for current position (needed for movement and orientation)
  const normal = ps.pos.clone().normalize();
  
  // Use a stable reference direction to avoid tangent space flipping
  // Choose reference based on which axis is least aligned with normal
  let refDir;
  const absX = Math.abs(normal.x);
  const absY = Math.abs(normal.y);
  const absZ = Math.abs(normal.z);
  
  if (absY < absX && absY < absZ) {
    refDir = new THREE.Vector3(0, 1, 0); // Use Y if normal is mostly horizontal
  } else if (absX < absZ) {
    refDir = new THREE.Vector3(1, 0, 0); // Use X if it's least aligned
  } else {
    refDir = new THREE.Vector3(0, 0, 1); // Use Z otherwise
  }
  
  // Build orthonormal tangent basis
  const tangent1 = new THREE.Vector3().crossVectors(normal, refDir).normalize();
  const tangent2 = new THREE.Vector3().crossVectors(tangent1, normal).normalize();
  
  // Calculate facing direction in 3D space from angle ps.dir
  // ps.dir = 0 points along tangent1, ps.dir = π/2 points along tangent2
  const facingDir = new THREE.Vector3();
  facingDir.addScaledVector(tangent1, Math.cos(ps.dir));
  facingDir.addScaledVector(tangent2, Math.sin(ps.dir));
  facingDir.normalize();

  // Walk forward in facing direction (except paused gestures)
  const isMoving = ps.gesture==='walk' || ps.gesture==='wiggle' || ps.gesture==='spin' || ps.gesture==='sprint';
  if(isMoving) {
    // Determine target speed multiplier based on gesture
    const targetMultiplier = ps.gesture==='spin' ? 0.4 : (ps.gesture==='sprint' ? 2.4 : 1.0);
    
    // Smoothly transition speed multiplier (lerp with factor 0.15 for smooth acceleration/deceleration)
    ps.speedMultiplier += (targetMultiplier - ps.speedMultiplier) * 0.15;
    
    const spd = ps.speed * ps.speedMultiplier;
    
    // Move on sphere surface
    const newPos = ps.pos.clone().addScaledVector(facingDir, spd);
    newPos.normalize().multiplyScalar(PLANET_R);
    
    // Check obstacle collisions (check against top hemisphere obstacles only)
    const PENGUIN_R = 0.32;
    let hit = null;
    if(newPos.y > 0) { // Only check obstacles on top hemisphere
      hit = obstacles.find(o => {
        const dx = newPos.x - o.x;
        const dz = newPos.z - o.z;
        const dy = newPos.y - surfaceY(o.x, o.z);
        return Math.sqrt(dx*dx + dy*dy + dz*dz) < (PENGUIN_R + o.r);
      });
    }
    
    if(hit) {
      // Bounce away from obstacle - just reverse direction
      ps.targetDir += Math.PI + rnd(-0.4, 0.4);
      if(ps.gesture === 'walk' || ps.gesture === 'sprint') {
        ps.gesture = 'bump';
        ps.gestureTick = 0.5;
      }
    } else {
      ps.pos.copy(newPos);
    }
  } else {
    // When not moving, reset speed multiplier to default
    ps.speedMultiplier += (1.0 - ps.speedMultiplier) * 0.15;
  }

  penguin.position.y = ps.jumpY;
  const _pNorm = ps.pos.clone().normalize();
  
  penguinPivot.position.copy(ps.pos);
  
  // Calculate target orientation
  // Step 1: Align penguin up direction (+Y) with surface normal
  const targetQuaternion = new THREE.Quaternion();
  targetQuaternion.setFromUnitVectors(_surfUp, _pNorm);
  
  // Step 2: Calculate what direction the penguin's forward (+Z) is currently pointing
  const currentForward = new THREE.Vector3(0, 0, 1).applyQuaternion(targetQuaternion);
  
  // Step 3: Project both current and target forward onto the tangent plane
  const currentForwardTangent = currentForward.clone().sub(_pNorm.clone().multiplyScalar(currentForward.dot(_pNorm))).normalize();
  const targetForwardTangent = facingDir.clone().sub(_pNorm.clone().multiplyScalar(facingDir.dot(_pNorm))).normalize();
  
  // Step 4: Calculate the rotation angle around the surface normal
  const cosAngle = currentForwardTangent.dot(targetForwardTangent);
  const sinAngle = new THREE.Vector3().crossVectors(currentForwardTangent, targetForwardTangent).dot(_pNorm);
  const rotationAngle = Math.atan2(sinAngle, cosAngle);
  
  // Step 5: Apply the rotation around the surface normal to get final target orientation
  const rotationAroundNormal = new THREE.Quaternion().setFromAxisAngle(_pNorm, rotationAngle);
  targetQuaternion.premultiply(rotationAroundNormal);
  
  // Smoothly interpolate from current to target quaternion (penguin-speed rotation)
  ps.currentQuaternion.slerp(targetQuaternion, 0.08); // 0.08 = slow, penguin-like rotation speed
  
  // Apply the smoothed rotation
  penguinPivot.quaternion.copy(ps.currentQuaternion);

  if (isFollowingPenguin) {
    // Third-person camera view with sphere at bottom of screen
    const cameraDistance = 0.5; // Distance behind penguin (closer for bigger sphere)
    const cameraHeight = 1.0;   // Height above penguin (lower for bigger sphere)
    
    // Position camera behind the penguin (opposite to facing direction)
    const cameraOffset = facingDir.clone().multiplyScalar(-cameraDistance);
    
    // Add height along the surface normal
    const heightOffset = _pNorm.clone().multiplyScalar(cameraHeight);
    
    // Calculate camera position
    const targetCameraPos = penguinPivot.position.clone()
      .add(cameraOffset)
      .add(heightOffset);
    
    // Smoothly move camera to target position
    camera.position.lerp(targetCameraPos, 0.1);
    
    // Look at penguin's base (feet level) to keep sphere at bottom of screen
    const lookTarget = penguinPivot.position.clone();
    
    controls.target.lerp(lookTarget, 0.1);
  }

  const isSprinting = ps.gesture === 'sprint';
  sprintAirPuffs.forEach((puff, i) => {
    if (!isSprinting) {
      puff.mesh.visible = false;
      puff.mesh.material.opacity = 0;
      return;
    }
    puff.age += DT * (2.3 + i * 0.08);
    if (puff.age > 1) puff.age -= 1;

    const side = puff.offset;
    const back = 0.3 + puff.age * 1.8;
    const rise = 0.05 + puff.age * 0.35;
    const jitter = Math.sin(t * 13 + i * 1.7) * 0.045;

    // Get penguin's 3D orientation from pivot
    const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(penguinPivot.quaternion);
    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(penguinPivot.quaternion);
    
    puff.mesh.position.copy(penguinPivot.position)
      .addScaledVector(forward, -back)
      .addScaledVector(right, side)
      .addScaledVector(_pNorm, rise + jitter);

    puff.mesh.scale.set(0.35 + puff.age * 1.05, 0.12 + puff.age * 0.32, 0.35 + puff.age * 1.05);
    puff.mesh.material.opacity = (1 - puff.age) * 0.82;
    puff.mesh.visible = true;
  });

  // Waddle sway
  const waddleFreq = isSprinting ? 15 : 8;
  penguin.rotation.z = isMoving ? Math.sin(t * waddleFreq) * 0.08 : 0;
  penguin.rotation.x = 0;
  penguin.rotation.y = 0; // Rotation is handled by pivot quaternion

  // Feet bob
  const footSwing = isMoving ? Math.sin(t * waddleFreq) * (isSprinting ? 0.45 : 0.3) : 0;
  penguin._footL.rotation.x =  footSwing;
  penguin._footR.rotation.x = -footSwing;

  // Default wings
  penguin._wingL.rotation.z =  0.15;
  penguin._wingR.rotation.z = -0.15;
  penguin._head.rotation.z  =  0;
  penguin._head.rotation.x  =  0;
  penguin._head.rotation.y  =  0;

  // ── Gesture animations ──
  if(ps.gesture==='wave') {
    penguin._wingR.rotation.z = -0.5 + Math.sin(t*8)*0.5;
  }
  else if(ps.gesture==='jump') {
    ps.jumpVel -= 0.004;
    ps.jumpY   += ps.jumpVel;
    if(ps.jumpY <= 0) { ps.jumpY=0; ps.jumpVel=0; ps.gesture='walk'; }
    penguin._wingL.rotation.z =  0.7;
    penguin._wingR.rotation.z = -0.7;
  }
  else if(ps.gesture==='spin') {
    ps.targetDir += 0.06;
    penguin._wingL.rotation.z =  0.5;
    penguin._wingR.rotation.z = -0.5;
  }
  else if(ps.gesture==='wiggle') {
    penguin._head.rotation.z  = Math.sin(t*10)*0.18;
    penguin._wingL.rotation.z =  Math.sin(t*5)*0.4;
    penguin._wingR.rotation.z = -Math.sin(t*5)*0.4;
  }
  else if(ps.gesture==='tilt') {
    penguin._head.rotation.y = Math.sin(t*1.5)*0.5;
    penguin._head.rotation.x = Math.sin(t*0.8)*0.15;
  }
  else if(ps.gesture==='bump') {
    // Dazed head shake + both wings flail
    penguin._head.rotation.z = Math.sin(t*14)*0.25;
    penguin._wingL.rotation.z =  0.6 + Math.sin(t*10)*0.2;
    penguin._wingR.rotation.z = -0.6 - Math.sin(t*10)*0.2;
  }
  else if(ps.gesture==='sprint') {
    penguin.rotation.x = -0.12;
    penguin._head.rotation.x = -0.22;
    penguin._wingL.rotation.z =  0.28 + Math.sin(t*18)*0.18;
    penguin._wingR.rotation.z = -0.28 - Math.sin(t*18)*0.18;
  }

  // ── Chimney smoke ──────────────────────────────────────────────────────
  _chimneyLocal.set(0.42, 2.18, 0.28);
  house.localToWorld(_chimneyLocal);
  const CWX = _chimneyLocal.x, CWY = _chimneyLocal.y, CWZ = _chimneyLocal.z;
  smokePuffs.forEach((s) => {
    s.life += DT * 0.28;
    if (s.life > 1) {
      s.life -= 1;
      s.xDrift = rnd(-0.04, 0.04);
      s.zDrift = rnd(-0.04, 0.04);
    }
    const rise = s.life * 2.4;
    const spread = s.life * 0.9;
    s.mesh.position.set(
      CWX + Math.sin(t * 1.2 + s.life * 6) * spread * 0.5 + s.xDrift * rise * 2,
      CWY + rise,
      CWZ + Math.cos(t * 1.1 + s.life * 5) * spread * 0.3 + s.zDrift * rise * 2
    );
    const sc = 0.12 + s.life * 0.55;
    s.mesh.scale.setScalar(sc);
    // Fade in quickly, linger, fade out gently
    const opacity = s.life < 0.15
      ? s.life / 0.15
      : 1 - ((s.life - 0.15) / 0.85);
    s.mesh.material.opacity = opacity * 0.38;
    // Lighten from grey toward white as it rises
    const grey = Math.floor(180 + s.life * 60);
    s.mesh.material.color.setRGB(grey/255, grey/255, grey/255);
  });

  snowParticles.forEach(s => {
    // Strong wind with swirling motion
    s.swirl += s.swirlSpeed;
    const windX = Math.cos(s.swirl + t * 0.5) * 0.12;
    const windZ = Math.sin(s.swirl + t * 0.7) * 0.12;
    
    // Calculate direction toward sphere surface (radial inward)
    const currentDist = Math.sqrt(
      s.mesh.position.x * s.mesh.position.x +
      s.mesh.position.y * s.mesh.position.y +
      s.mesh.position.z * s.mesh.position.z
    );
    
    const toCenter = {
      x: -s.mesh.position.x / currentDist,
      y: -s.mesh.position.y / currentDist,
      z: -s.mesh.position.z / currentDist
    };
    
    // Move toward surface + wind
    s.mesh.position.x += toCenter.x * s.velocity.y + windX;
    s.mesh.position.y += toCenter.y * s.velocity.y;
    s.mesh.position.z += toCenter.z * s.velocity.y + windZ;
    
    // Reset when reaching near the icy surface or blown too far
    const newDist = Math.sqrt(
      s.mesh.position.x * s.mesh.position.x +
      s.mesh.position.y * s.mesh.position.y +
      s.mesh.position.z * s.mesh.position.z
    );
    
    if(newDist < PLANET_R + 0.3 || newDist > 12) {
      const angle = rnd(0, Math.PI * 2);
      const dist = rnd(9, 11);
      const elevation = rnd(-0.8, -0.3);
      s.mesh.position.set(
        Math.cos(angle) * dist * Math.cos(elevation),
        Math.sin(elevation) * dist,
        Math.sin(angle) * dist * Math.cos(elevation)
      );
    }
  });

  // ── Air lines ──────────────────────────────────────────────────────────────────────────────────────────────────
  airLines.forEach(air => {
    air.phase += air.speed;
    
    // Update curve points to create twirling motion
    for (let j = 0; j < air.points.length; j++) {
      const progress = j / air.points.length;
      const twist = Math.sin(air.phase + progress * air.twist * Math.PI * 2) * 0.8;
      const spiralX = Math.cos(air.phase * 2 + progress * Math.PI * 4) * twist;
      const spiralZ = Math.sin(air.phase * 2 + progress * Math.PI * 4) * twist;
      
      air.points[j].x = spiralX;
      air.points[j].y = progress * 6 - 3;
      air.points[j].z = spiralZ;
    }
    
    // Update the geometry
    air.curve.points = air.points;
    const newGeometry = new THREE.TubeGeometry(air.curve, 20, 0.02, 4, false);
    air.mesh.geometry.dispose();
    air.mesh.geometry = newGeometry;
    
    // Drift the whole line
    air.mesh.position.x = Math.cos(air.baseAngle + t * 0.1) * air.baseDist;
    air.mesh.position.z = Math.sin(air.baseAngle + t * 0.1) * air.baseDist;
    air.mesh.position.y += 0.02;
    
    // Reset when too high
    if (air.mesh.position.y > -2) {
      air.mesh.position.y = rnd(-7, -3);
    }
  });

  controls.update();
  renderer.render(scene,camera);
}
animate();
</script>
