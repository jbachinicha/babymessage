    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #fce8f4; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(220, 100, 150, 0.85);
      font-family: Georgia, serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(255,200,220,0.8);
    }
    #followPenguinBtn {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      background: rgba(232, 77, 136, 0.9);
      color: #fff;
      font-family: Georgia, serif;
      font-size: 14px;
      letter-spacing: 0.02em;
      cursor: pointer;
      z-index: 10;

      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    #followPenguinBtn:hover {
      transform: translateX(-50%) translateY(-1px);
      box-shadow: 0 10px 24px rgba(232, 77, 136, 0.35);
    }

    }
    #nightCycleBtn {

      top: 18px;
      right: 18px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.75);
      background: rgba(58, 90, 176, 0.85);
      color: #fff;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 8px 18px rgba(40, 66, 138, 0.34);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      display: grid;
      place-items: center;
      padding: 0;
    }
    #nightCycleBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(40, 66, 138, 0.4);
    }
    #nightCycleBtn.is-active {
      background: rgba(28, 44, 92, 0.92);
      box-shadow: 0 8px 20px rgba(20, 32, 70, 0.45);
    }
    #nightCycleBtn .icon-day,
    #nightCycleBtn .icon-night {
      font-size: 20px;
      line-height: 1;
      transition: opacity 0.2s ease, transform 0.2s ease;
      position: absolute;
    }
    #nightCycleBtn .icon-night { opacity: 0; transform: scale(0.8); }
    #nightCycleBtn.is-night .icon-day { opacity: 0; transform: scale(0.8); }
    #nightCycleBtn.is-night .icon-night { opacity: 1; transform: scale(1); }

function makeFlower(x, z) {
  const g = new THREE.Group();

    petal.scale.set(1, 0.55, 1.5);
    petal.castShadow = true;
    petal.receiveShadow = true;
    g.add(petal);

  // Center disk
  const center = new THREE.Mesh(new THREE.CylinderGeometry(0.1*sc,0.1*sc,0.05*sc,12),
    new THREE.MeshLambertMaterial({color:0xffdd55}));
  center.position.y = 0.54*sc;
  center.castShadow = true;
  center.receiveShadow = true;

    dot.receiveShadow = true;
    g.add(dot);
  }

  g.position.set(x, 0.97, z);
  g.rotation.y = rnd(0, Math.PI*2);
  return g;
}

// ── Hearts ─────────────────────────────────────────────────────────────────
function makeHeart(size, color) {
  size = size||0.3;
  const s = size;
  const sh = new THREE.Shape();
  sh.moveTo(0,s*0.6);
  sh.bezierCurveTo(s*0.05,s,s*0.7,s,s*0.7,s*0.5);
  sh.bezierCurveTo(s*0.7,s*0.2,s*0.4,-s*0.1,0,-s*0.6);
  sh.bezierCurveTo(-s*0.4,-s*0.1,-s*0.7,s*0.2,-s*0.7,s*0.5);
  sh.bezierCurveTo(-s*0.7,s,-s*0.05,s,0,s*0.6);
  const geo = new THREE.ExtrudeGeometry(sh,{depth:size*0.28,bevelEnabled:true,bevelSize:0.018,bevelThickness:0.018,bevelSegments:3});
  geo.center();
  return new THREE.Mesh(geo, new THREE.MeshLambertMaterial({color:color||pick([0xff6b9d,0xff8cb4,0xffb0cc,0xff4d80])}));
}

// ── Text sprite ────────────────────────────────────────────────────────────
function makeTextSprite(text, options = {}) {
  const W = options.width || 512;
  const H = options.height || 128;
  const fontSize = options.fontSize || 46;
  const fillColor = options.fillColor || '#e84d88';
  const scaleX = options.scaleX || 5.5;
  const scaleY = options.scaleY || 1.375;
  const lineHeight = options.lineHeight || Math.round(fontSize * 1.2);
  const cvs=document.createElement('canvas');
  cvs.width=W; cvs.height=H;
  const ctx=cvs.getContext('2d');
  ctx.shadowColor='rgba(255,120,160,0.6)'; ctx.shadowBlur=18;
  ctx.font=`bold ${fontSize}px Georgia,serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=5;
  const lines = Array.isArray(text) ? text : String(text).split('\n');
  const totalHeight = (lines.length - 1) * lineHeight;
  const startY = H / 2 - totalHeight / 2;
  lines.forEach((line, i) => {
    const y = startY + i * lineHeight;
    ctx.strokeText(line, W / 2, y);
    ctx.fillStyle = fillColor;
    ctx.fillText(line, W / 2, y);
  });
  const tex=new THREE.CanvasTexture(cvs);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
  sp.scale.set(scaleX,scaleY,1); return sp;
}

function makePenguin() {
  const root = new THREE.Group();

  body.scale.set(1,1.18,0.9); body.position.y=0.3; root.add(body);

  // Belly patch
  const belly = new THREE.Mesh(new THREE.SphereGeometry(0.19,10,8), white);
  belly.scale.set(1,1.1,0.6); belly.position.set(0,0.32,0.18); root.add(belly);

  // Head
  const head = new THREE.Group();
  const headBall = new THREE.Mesh(new THREE.SphereGeometry(0.19,12,10), black);
  headBall.position.set(0,0.62,0); head.add(headBall);

  // Face white patch
  const face = new THREE.Mesh(new THREE.SphereGeometry(0.13,10,8), white);
  face.scale.set(1,1,0.5); face.position.set(0,0.62,0.14); head.add(face);

  // Eyes
  [-1,1].forEach(side=>{
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.033,7,6),
      new THREE.MeshLambertMaterial({color:0x111111}));
    eye.position.set(side*0.08,0.67,0.16); head.add(eye);
    const shine = new THREE.Mesh(new THREE.SphereGeometry(0.012,5,4),
      new THREE.MeshLambertMaterial({color:0xffffff}));
    shine.position.set(side*0.085,0.675,0.185); head.add(shine);
  });

  // Blush
  [-1,1].forEach(side=>{
    const blush = new THREE.Mesh(new THREE.SphereGeometry(0.035,6,5), pink);
    blush.scale.set(1,0.5,0.3); blush.position.set(side*0.11,0.625,0.175); head.add(blush);
  });

  // Beak
  const beak = new THREE.Mesh(new THREE.ConeGeometry(0.045,0.09,6), orange);
  beak.rotation.x=Math.PI/2; beak.position.set(0,0.615,0.23); head.add(beak);

  root.add(head);
  root._head = head;

  // Wings
  const wingL = new THREE.Group(), wingR = new THREE.Group();
  const wgL = new THREE.Mesh(new THREE.SphereGeometry(0.12,8,6),black);
  wgL.scale.set(0.45,0.9,0.3); wgL.position.set(0,-0.05,0); wingL.add(wgL);
  wingL.position.set(-0.28,0.38,0); root.add(wingL);

  const wgR = new THREE.Mesh(new THREE.SphereGeometry(0.12,8,6),black);
  wgR.scale.set(0.45,0.9,0.3); wgR.position.set(0,-0.05,0); wingR.add(wgR);
  wingR.position.set(0.28,0.38,0); root.add(wingR);

  root._wingL=wingL; root._wingR=wingR;

  // Feet
  const footL = new THREE.Group(), footR = new THREE.Group();
  [footL,footR].forEach((f,i)=>{
    const foot = new THREE.Mesh(new THREE.SphereGeometry(0.065,7,5), orange);
    foot.scale.set(1.4,0.4,1.1); f.add(foot);
    f.position.set(i===0?-0.1:0.1,0.04,0.05); root.add(f);
  });
  root._footL=footL; root._footR=footR;

  return root;
}

const penguin = makePenguin();
penguin.position.set(2.2, 0.97, 0);
penguin.scale.setScalar(0.85);
penguin.traverse(child => { if (child instanceof THREE.Mesh) child.castShadow = true; });
scene.add(penguin);

const sprintAirPuffs = [];
for (let i = 0; i < 14; i++) {
  const puff = new THREE.Mesh(
    new THREE.SphereGeometry(0.11, 10, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, depthWrite: false })
  );
  puff.visible = false;
  puff.castShadow = false;
  puff.receiveShadow = false;
  scene.add(puff);
  sprintAirPuffs.push({ mesh: puff, age: i / 14, offset: rnd(-0.24, 0.24) });
}

const penguinState = {
  x: 0, z: 0,           // position on island
  dir: rnd(0, Math.PI*2), // facing direction
  speed: 0.022,
  gesture: 'walk', gestureTick: 0, nextGesture: rnd(3,6),
  jumpY: 0, jumpVel: 0,
  turnTimer: rnd(1.5, 3.5), // time until next random turn
  turnDir: 0,
};
const GESTURES = ['wave','jump','spin','wiggle','tilt','sprint','sprint','wave'];

// Console helper: trigger sprint manually via window.runPenguinSprint()
window.runPenguinSprint = function(durationSec) {
  const d = Number(durationSec);
  const sprintDuration = Number.isFinite(d) && d > 0 ? d : rnd(2.6, 5.4);
  penguinState.gesture = 'sprint';
  penguinState.gestureTick = sprintDuration;
  penguinState.nextGesture = rnd(3.0, 6.0);
  return { gesture: penguinState.gesture, duration: sprintDuration };
};

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ── Animate ────────────────────────────────────────────────────────────────
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  const dt=clock.getDelta ? 0.016 : 0.016;

  floatingHearts.forEach(({mesh,speed,phase,rotSpd,baseY})=>{
    mesh.position.y=baseY+Math.sin(t*speed+phase)*0.32;
    mesh.rotation.y+=rotSpd*0.012;
  });
  textSprite.position.y=5.2+Math.sin(t*0.9)*0.18;
  subTextSprite.position.y=4.35+Math.sin(t*0.9+0.4)*0.12;

  // ── Penguin logic ───────────────────────────────────────────────────────
  const ps = penguinState;
  const DT = 0.016;
  ps.gestureTick  -= DT;
  ps.nextGesture  -= DT;
  ps.turnTimer    -= DT;

  const cycleTarget = isNightCycleEnabled ? (Math.sin(t * 0.12) * 0.5 + 0.5) : 0;
  nightBlend += (cycleTarget - nightBlend) * 0.02;
  nightCycleBtn.classList.toggle('is-night', nightBlend > 0.5);
  scene.background.copy(DAY_SKY_COLOR).lerp(NIGHT_SKY_COLOR, nightBlend);
  scene.fog.color.copy(DAY_FOG_COLOR).lerp(NIGHT_FOG_COLOR, nightBlend);
  ambient.intensity = 1.1 - 0.55 * nightBlend;
  sun.intensity = 1.4 - 1.08 * nightBlend;
  fill.intensity = 0.5 + 0.34 * nightBlend;
  sun.color.copy(DAY_SUN_COLOR).lerp(NIGHT_SUN_COLOR, nightBlend);
  fill.color.copy(DAY_FILL_COLOR).lerp(NIGHT_FILL_COLOR, nightBlend);
  const starFade = Math.max(0, (nightBlend - 0.2) / 0.8);
  const twinkle = 0.82 + 0.18 * Math.sin(t * 2.7);
  starMat.opacity = starFade * twinkle;
  stars.rotation.y += 0.00025 + nightBlend * 0.00065;

  // Pick new random gesture
  if(ps.nextGesture <= 0 && ps.gestureTick <= 0) {
    ps.gesture = GESTURES[Math.floor(Math.random()*GESTURES.length)];
    ps.gestureTick = ps.gesture==='sprint' ? rnd(2.6, 5.4) : rnd(1.5, 3.0);
    ps.nextGesture = rnd(3.0, 6.0);
    if(ps.gesture==='jump') ps.jumpVel = 0.055;
  }
  if(ps.gestureTick <= 0) ps.gesture = 'walk';

  // Random turning
  if(ps.turnTimer <= 0) {
    ps.dir += rnd(-1.1, 1.1);
    ps.turnTimer = rnd(1.5, 4.0);
  }

  // Walk forward in facing direction (except paused gestures)
  const isMoving = ps.gesture==='walk' || ps.gesture==='wiggle' || ps.gesture==='spin' || ps.gesture==='sprint';
  if(isMoving) {
    const spd = ps.gesture==='spin' ? ps.speed*0.4 : (ps.gesture==='sprint' ? ps.speed*2.4 : ps.speed);
    const nx = ps.x + Math.sin(ps.dir) * spd;
    const nz = ps.z + Math.cos(ps.dir) * spd;

    // Stay inside island radius, bounce off edge
    if(Math.hypot(nx, nz) < PENGUIN_WALK_RADIUS) {
      // Check obstacle collisions
      const PENGUIN_R = 0.32;
      const hit = obstacles.find(o => Math.hypot(nx - o.x, nz - o.z) < (PENGUIN_R + o.r));
      if(hit) {
        // Bounce away from obstacle + trigger bump gesture
        const awayAngle = Math.atan2(ps.x - hit.x, ps.z - hit.z);
        ps.dir = awayAngle + rnd(-0.4, 0.4);
        if(ps.gesture === 'walk') {
          ps.gesture = 'bump';
          ps.gestureTick = 0.5;
        }
      } else {
        ps.x = nx; ps.z = nz;
      }
    } else {
      // Turn back toward center
      const toCenterAngle = Math.atan2(-ps.x, -ps.z);
      ps.dir = toCenterAngle + rnd(-0.5, 0.5);
    }
  }

  penguin.position.x = ps.x;
  penguin.position.z = ps.z;
  penguin.position.y = 0.97 + ps.jumpY;

  if (isFollowingPenguin) {
    followTarget.set(penguin.position.x, penguin.position.y + 0.45, penguin.position.z);
    controls.target.lerp(followTarget, 0.14);
  }

  const isSprinting = ps.gesture === 'sprint';
  sprintAirPuffs.forEach((puff, i) => {
    if (!isSprinting) {
      puff.mesh.visible = false;
      puff.mesh.material.opacity = 0;
      return;
    }
    puff.age += DT * (2.3 + i * 0.08);
    if (puff.age > 1) puff.age -= 1;

    const side = puff.offset;
    const back = 0.3 + puff.age * 1.8;
    const rise = 0.05 + puff.age * 0.35;
    const jitter = Math.sin(t * 13 + i * 1.7) * 0.045;

    puff.mesh.position.set(
      penguin.position.x - Math.sin(ps.dir) * back + Math.cos(ps.dir) * side,
      penguin.position.y + rise + jitter,
      penguin.position.z - Math.cos(ps.dir) * back - Math.sin(ps.dir) * side
    );
    puff.mesh.scale.set(0.35 + puff.age * 1.05, 0.12 + puff.age * 0.32, 0.35 + puff.age * 1.05);
    puff.mesh.material.opacity = (1 - puff.age) * 0.82;
    puff.mesh.visible = true;
  });

  // Face walk direction
  penguin.rotation.y = ps.dir;

  // Waddle sway
  const waddleFreq = isSprinting ? 15 : 8;
  penguin.rotation.z = isMoving ? Math.sin(t * waddleFreq) * 0.08 : 0;
  penguin.rotation.x = 0;

  // Feet bob
  const footSwing = isMoving ? Math.sin(t * waddleFreq) * (isSprinting ? 0.45 : 0.3) : 0;
  penguin._footL.rotation.x =  footSwing;
  penguin._footR.rotation.x = -footSwing;

  // Default wings
  penguin._wingL.rotation.z =  0.15;
  penguin._wingR.rotation.z = -0.15;
  penguin._head.rotation.z  =  0;
  penguin._head.rotation.x  =  0;
  penguin._head.rotation.y  =  0;

  // ── Gesture animations ──
  if(ps.gesture==='wave') {
    penguin._wingR.rotation.z = -0.5 + Math.sin(t*8)*0.5;
  }
  else if(ps.gesture==='jump') {
    ps.jumpVel -= 0.004;
    ps.jumpY   += ps.jumpVel;
    if(ps.jumpY <= 0) { ps.jumpY=0; ps.jumpVel=0; ps.gesture='walk'; }
    penguin._wingL.rotation.z =  0.7;
    penguin._wingR.rotation.z = -0.7;
  }
  else if(ps.gesture==='spin') {
    ps.dir += 0.06;
    penguin._wingL.rotation.z =  0.5;
    penguin._wingR.rotation.z = -0.5;
  }
  else if(ps.gesture==='wiggle') {
    penguin._head.rotation.z  = Math.sin(t*10)*0.18;
    penguin._wingL.rotation.z =  Math.sin(t*5)*0.4;
    penguin._wingR.rotation.z = -Math.sin(t*5)*0.4;
  }
  else if(ps.gesture==='tilt') {
    penguin._head.rotation.y = Math.sin(t*1.5)*0.5;
    penguin._head.rotation.x = Math.sin(t*0.8)*0.15;
  }
  else if(ps.gesture==='bump') {
    // Dazed head shake + both wings flail
    penguin._head.rotation.z = Math.sin(t*14)*0.25;
    penguin._wingL.rotation.z =  0.6 + Math.sin(t*10)*0.2;
    penguin._wingR.rotation.z = -0.6 - Math.sin(t*10)*0.2;
  }
  else if(ps.gesture==='sprint') {
    penguin.rotation.x = -0.12;
    penguin._head.rotation.x = -0.22;
    penguin._wingL.rotation.z =  0.28 + Math.sin(t*18)*0.18;
    penguin._wingR.rotation.z = -0.28 - Math.sin(t*18)*0.18;
  }

  controls.update();
  renderer.render(scene,camera);
}
animate();
</script>
</body>
